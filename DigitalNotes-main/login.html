<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Iniciar sesión · Digital Notes</title>
  <link rel="icon" type="image/png" href="logodn.index.png" />
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Inter,system-ui,sans-serif;background:linear-gradient(135deg,#ffdce5,#ffe9c7);color:#2c1b23}
    .card{width:min(460px,92vw);background:#fff;padding:24px;border-radius:16px;box-shadow:0 18px 45px rgba(94,38,63,.2)}
    h1{margin:0 0 12px;font-size:28px}
    p{margin:0 0 16px;color:#6b4350}
    label{display:block;font-size:13px;font-weight:700;margin:14px 0 6px}
    input{width:100%;padding:11px;border:1px solid #c8a1b0;border-radius:9px;box-sizing:border-box}
    button{width:100%;padding:12px;border:0;border-radius:10px;background:#be7899;color:#fff;font-weight:700;cursor:pointer;margin-top:16px}
    .toggle{margin-top:10px;background:none;border:none;color:#8a4563;text-decoration:underline;padding:0;width:auto}
    #msg{min-height:24px;margin-top:10px;font-weight:700;color:#8a2b56}
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">Crea una cuenta</h1>
    <p><span id="prompt">¿Ya estás registrado/a?</span> <button id="toggle" class="toggle" type="button">Inicia sesión</button></p>
    <label for="name">Nombre</label><input id="name" type="text" placeholder="Tu nombre" />
    <label for="email">Email</label><input id="email" type="email" placeholder="tu@email.com" />
    <label for="password">Contraseña</label><input id="password" type="password" placeholder="******" />
    <label for="birth">Fecha de nacimiento</label><input id="birth" type="date" />
    <button id="submit" type="button">Registrarse</button>
    <div id="msg" aria-live="polite"></div>
  </div>

  <script type="module">
    import { initializeApp, getApps, getApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, setPersistence, browserLocalPersistence } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyB-9P1aSzryyeoQomZokdFScoDgl1GaIo4",
      authDomain: "digitalnotes-c3bb7.firebaseapp.com",
      projectId: "digitalnotes-c3bb7",
      storageBucket: "digitalnotes-c3bb7.appspot.com",
      messagingSenderId: "822613016150",
      appId: "1:822613016150:web:6816e7d070396cf67cc5f7"
    };

    const app = getApps().length ? getApp() : initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let mode = 'register';

    const qs = s=>document.querySelector(s);
    const mapError = (error)=>({
      'auth/email-already-in-use':'Ese correo ya está registrado.',
      'auth/invalid-email':'El correo no es válido.',
      'auth/weak-password':'La contraseña debe tener al menos 6 caracteres.',
      'auth/missing-password':'Ingresa una contraseña.',
      'auth/invalid-credential':'Correo o contraseña incorrectos.',
      'auth/wrong-password':'Correo o contraseña incorrectos.',
      'auth/user-not-found':'No existe una cuenta con ese correo.',
      'auth/too-many-requests':'Demasiados intentos. Intenta de nuevo más tarde.'
    }[error?.code] || error?.message || 'Ocurrió un error inesperado.');

    function renderMode(){
      const register = mode === 'register';
      qs('#title').textContent = register ? 'Crea una cuenta' : 'Inicia sesión';
      qs('#prompt').textContent = register ? '¿Ya estás registrado/a?' : '¿Aún no tienes cuenta?';
      qs('#toggle').textContent = register ? 'Inicia sesión' : 'Regístrate';
      qs('#submit').textContent = register ? 'Registrarse' : 'Entrar';
      qs('#name').style.display = register ? 'block' : 'none';
      qs('label[for="name"]').style.display = register ? 'block' : 'none';
      qs('#birth').style.display = register ? 'block' : 'none';
      qs('label[for="birth"]').style.display = register ? 'block' : 'none';
      qs('#msg').textContent = '';
    }

    async function submit(){
      const email = qs('#email').value.trim().toLowerCase();
      const password = qs('#password').value;
      const name = qs('#name').value.trim();
      const birth = qs('#birth').value;
      const msg = qs('#msg');
      if(!email || !password){ msg.textContent = 'Completa email y contraseña.'; return; }

      qs('#submit').disabled = true;
      try{
        await setPersistence(auth, browserLocalPersistence);
        if(mode === 'register'){
          if(!birth){ msg.textContent = 'Completa tu fecha de nacimiento.'; return; }
          const credential = await createUserWithEmailAndPassword(auth, email, password);
          const profileName = name || email.split('@')[0];
          await updateProfile(credential.user, { displayName: profileName });
          await setDoc(doc(db, 'users', credential.user.uid), {
            uid: credential.user.uid,
            email,
            displayName: profileName,
            birthdate: birth,
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          }, { merge: true });
        } else {
          await signInWithEmailAndPassword(auth, email, password);
        }
        window.location.replace('index.html');
      }catch(error){
        msg.textContent = mapError(error);
      }finally{
        qs('#submit').disabled = false;
      }
    }

    qs('#toggle').addEventListener('click', ()=>{ mode = mode === 'register' ? 'login' : 'register'; renderMode(); });
    qs('#submit').addEventListener('click', submit);
    await setPersistence(auth, browserLocalPersistence);
    onAuthStateChanged(auth, user=>{ if(user) window.location.replace('index.html'); });
    renderMode();
  </script>
</body>
</html>
